V<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dave's Exercise Cards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
            color: #333;
        }

        #card-container {
            width: 320px;
            height: 450px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
            border: 4px solid #e2e8f0;
            transition: transform 0.2s ease-in-out;
        }

        #exercise-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        #exercise-text {
            font-size: 26px;
            font-weight: bold;
            color: #2d3748;
        }

        #button-container {
            display: flex;
            gap: 15px; 
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #4299e1;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.4);
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background-color: #3182ce;
        }
        
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 4px rgba(66, 153, 225, 0.4);
        }

        #back-btn {
            background-color: #a0aec0;
        }

        button:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="card-container">
        <img id="exercise-image" src="" alt="Exercise Image">
        <div id="exercise-text">Press the button to start!</div>
    </div>

    <div id="button-container">
        <button id="back-btn" onclick="goBack()" disabled>Back</button>
        <button onclick="drawCard()">Draw Next Exercise</button>
    </div>

    <script>
        const exercises = [
            { name: "10x Star Jumps", image: "star-jumps.jpg" },
            { name: "Bear Walks", image: "bear-walks.jpg" },
            { name: "Spider Walks", image: "spider-walks.jpg" },
            { name: "Wheelbarrow Walks", image: "wheelbarrow-walks.jpg" },
            { name: "3x Forward Roll", image: "forward-roll.jpg" },
            { name: "3x Backwards Roll", image: "backwards-roll.jpg" },
            { name: "5x Frog Jumps", image: "frog-jumps.jpg" },
            { name: "10x Frog Jumps", image: "frog-jumps.jpg" },
            { name: "Belly Crawl", image: "belly-crawl.jpg" },
            { name: "Balance On < Left Foot For 10 Seconds", image: "balance.jpg" },
            { name: "Balance On Right Foot > For 10 Seconds", image: "balance.jpg" },
            { name: "10x Passes", image: "passes.jpg" },
            { name: "25x Passes", image: "passes.jpg" },
            { name: "15 Second Handstand", image: "handstand.jpg" },
            { name: "10x Backwards Falls", image: "backwards-fall.jpg" },
            { name: "Backward Shark crawls", image: "backwards-crocodile-crawls.jpg" },
            { name: "Forward Shark crawls", image: "forwards-crocodile-crawls.jpg" },
            { name: "15x Second Handstand", image: "handstand-facing-wall.jpg" },
            { name: "10x Shark jumps", image: "shark-jumps.jpg" },
            { name: "10x Feet Switches", image: "switch-feet.jpg" },
            { name: "Knee Walks", image: "knee-walks.jpg" },
            { name: "10x Spider Bear Switches", image: "spider-bear.jpg" },
            { name: "10x Squats", image: "squat.jpg" },
            { name: "10x Sprawls", image: "sprawl.jpg" },
            { name: "Backwards Bear Walks", image: "backwards_bear_walks.jpg" },
            { name: "10x Forward Backward Jumps", image: "forward_backward_jumps.jpg" },
            { name: "Frog Walks", image: "frog_walk.jpg" },
            { name: "10x Heel Taps", image: "heel_taps.jpg" },
            { name: "10x High Knees", image: "high_knees.jpg" },
            { name: "3x Roll Overs", image: "roll_over.jpg" },
            { name: "Scorpion Walk", image: "scorpion_walk.jpg" },
            { name: "10x Sideways Jumps", image: "sideways_jumps.jpg" },
            { name: "10x Hand Opposite Knee Crunch", image: "hand-opposite-knee-crunch.jpg" }
        ];

        let cardHistory = [];
        let currentIndex = -1;

        function drawCard() {
            const randomIndex = Math.floor(Math.random() * exercises.length);
            
            if (currentIndex < cardHistory.length - 1) {
                cardHistory = cardHistory.slice(0, currentIndex + 1);
            }
            
            cardHistory.push(randomIndex);
            currentIndex++;
            
            displayCard(cardHistory[currentIndex]);
        }

        function goBack() {
            if (currentIndex > 0) {
                currentIndex--;
                displayCard(cardHistory[currentIndex]);
            }
        }

        function displayCard(index) {
            const selectedExercise = exercises[index];
            document.getElementById('exercise-text').innerText = selectedExercise.name;
            
            const imgElement = document.getElementById('exercise-image');
            
            // CRITICAL FIX: Directing the browser into the subfolder
            imgElement.src = "Dave-Exercise-App/" + selectedExercise.image;
            imgElement.alt = selectedExercise.name;
            imgElement.style.display = 'block'; 
            
            const backBtn = document.getElementById('back-btn');
            backBtn.disabled = (currentIndex <= 0);
            
            const cardElement = document.getElementById('card-container');
            cardElement.style.transform = 'scale(1.05)';
            setTimeout(() => {
                cardElement.style.transform = 'scale(1)';
            }, 150);
        }
    </script>
</body>
</html>
